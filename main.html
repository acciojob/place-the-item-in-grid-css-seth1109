<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2x2 Grid</title>

  <style>
    /* Grid container */
    .holder {
      display: grid;
      width: 200px;
      height: 200px;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
    }

    /* Optional styling for visibility (items not modified structurally) */
    .holder div {
      border: 1px solid black;
    }
  </style>
</head>

<body>

  <div class="holder">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
  </div>

</body>
</html>
